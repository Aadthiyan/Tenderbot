version: "3.9"

services:

  # ── FastAPI Backend ─────────────────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: tenderbot_backend
    ports:
      - "8000:8000"
    environment:
      - TINYFISH_API_KEY=${TINYFISH_API_KEY}
      - ENABLE_LIVE_SUBMIT=${ENABLE_LIVE_SUBMIT:-False}
      - FIREWORKS_API_KEY=${FIREWORKS_API_KEY}
      - FIREWORKS_MODEL=${FIREWORKS_MODEL:-accounts/fireworks/models/llama-v3p1-70b-instruct}
      - MONGODB_URI=${MONGODB_URI}
      - MONGODB_DB_NAME=${MONGODB_DB_NAME:-tenderbot}
      - COMPOSIO_API_KEY=${COMPOSIO_API_KEY}
      - SLACK_CHANNEL=${SLACK_CHANNEL:-#procurement-alerts}
      - ELEVENLABS_API_KEY=${ELEVENLABS_API_KEY}
      - ELEVENLABS_VOICE_ID=${ELEVENLABS_VOICE_ID:-21m00Tcm4TlvDq8ikWAM}
      - AGENTOPS_API_KEY=${AGENTOPS_API_KEY}
      - BACKEND_URL=http://localhost:8000
      - FRONTEND_URL=http://localhost:3000
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
    env_file:
      - .env
    volumes:
      - ./backend:/app/backend
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── Next.js Frontend ────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.frontend
    container_name: tenderbot_frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    depends_on:
      - backend
    restart: unless-stopped
